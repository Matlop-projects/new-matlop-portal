<div class="login-container">
  <div class="content">
    <div class="form-section">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="details d-flex justify-content-between">
          <div class="d-flex flex-col">
            <h2 class="bold">
              {{ "login.welcome" | translate }}
            </h2>
            <p class="text-gray-light">
              {{ "login.welcome_message" | translate }}
            </p>
          </div>

          <div class="user-section">
            <button type="button" class="lang-btn" (click)="toggleLanguage()">
              {{ selectedLang.toUpperCase() == "AR" ? "EN" : "AR" }}
            </button>
          </div>
        </div>

        <div class="d-flex flex-col gap-2 mt-2">
          <label for="userName">{{ "signup.mobile" | translate }}</label>
          <div class="phone-input-container">
            <select 
              class="country-dropdown"
              formControlName="country"
              id="country"
            >
              <option value="SA">🇸🇦 +966</option>
              <option value="OM">🇴🇲 +968</option>
            </select>
            <input
              class="mobile-number-input"
              pInputText
              id="userName"
              placeholder="{{ getMobilePlaceholder() }}"
              formControlName="userName"
            />
          </div>
          <div
            *ngIf="
              loginForm.get('userName')?.touched ||
              loginForm.get('userName')?.dirty
            "
          >
            <div
              *ngIf="loginForm.get('userName')?.errors?.['required']"
              class="text-danger"
            >
              {{ "errors.required" | translate }}
            </div>
            <div
              *ngIf="loginForm.get('userName')?.errors?.['pattern']||loginForm.get('userName')?.errors?.['maxLength']||loginForm.get('userName')?.errors?.['minLength']"
              class="text-danger"
            >
              {{ getMobileErrorMessage() }}
            </div>
          </div>
        </div>
        <div class="d-flex flex-col gap-2 mt-2">
          <label for="password">{{ "login.password" | translate }}</label>
          <p-password
            formControlName="password"
            [toggleMask]="true"
            [feedback]="false"
            inputStyleClass="w-100"
            styleClass="w-100"
          ></p-password>
          <div
            *ngIf="
              loginForm.get('password')?.touched ||
              loginForm.get('password')?.dirty
            "
          >
            <div
              *ngIf="loginForm.get('password')?.errors?.['required']"
              class="text-danger"
            >
              {{ "errors.required" | translate }}
            </div>
            <div
              *ngIf="loginForm.get('password')?.errors?.['minlength']"
              class="text-danger"
            >
              {{ "errors.minLength" | translate }}
            </div>
          </div>
        </div>

        <div class="d-flex justify-content-between flex-wrap align-items-center gap-2">
          <div class="d-flex justify-contnet-start remember-me ckeck-box">
            <p-checkbox class="remember-checkbox" [value]="'checked'" />
            <label class="fz-16" for="password">
              {{ "login.remember_me" | translate }}
            </label>
          </div>
          <div class="d-flex flex-col">
            <a class="forget_password" routerLink="/auth/forget_password">
              {{ "login.forget_password" | translate }}
            </a>
          </div>
        </div>

        <div class="recaptcha-wrap mt-2" *ngIf="recaptchaSiteKey">
          <div #recaptchaContainer class="recaptcha-container"></div>
        </div>

        <div class="button text-center mt-2">
          <button
            class="btn btn-login w-100"
            type="submit"
            [disabled]="!loginForm.valid || (recaptchaSiteKey && !captchaToken)"
          >
            {{ "login.submit" | translate }}
          </button>
          <button
            class="btn btn-guest w-100 mt-2"
            type="button"
            (click)="loginAsGuest()"
          >
            {{ "login.guest_login" | translate }}
          </button>
          <a class="forget_password signup mt-2 d-inline-block" routerLink="/auth/signup">{{
            "login.signup" | translate
          }}</a>
        </div>
      </form>
    </div>
    <div class="details-section hide-part">
      <!-- صورة أو تفاصيل إضافية -->
    </div>
  </div>
</div>

<!-- OTP after login removed: first-order OTP is handled when creating an order -->
<p-dialog
  [header]="'login.guest_select_country' | translate"
  [(visible)]="showGuestCountryDialog"
  [modal]="true"
  [style]="{ width: '22rem' }"
  [draggable]="false"
  [resizable]="false"
  (onHide)="closeGuestCountryDialog()">
  <div class="guest-country-options">
    <button type="button" class="btn btn-country w-100 mb-2" (click)="onGuestCountrySelected('SA')">
      🇸🇦 {{ "login.guest_country_saudia" | translate }}
    </button>
    <button type="button" class="btn btn-country w-100" (click)="onGuestCountrySelected('OM')">
      🇴🇲 {{ "login.guest_country_oman" | translate }}
    </button>
  </div>
</p-dialog>
